<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h2 class="mb-4">Editar empleado</h2>

            <form th:action="@{/employee/editar}" th:object="${employee}" method="post">

                <input type="hidden" th:field="*{empNo}"/>

                <div class="mb-3">
                    <label class="form-label">Número de empleado</label>
                    <input type="text" th:value="${employee.empNo}" class="form-control" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{firstName}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Apellido</label>
                    <input type="text" th:field="*{lastName}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Género</label>
                    <select th:field="*{gender}" class="form-select">
                        <option value="M">Masculino</option>
                        <option value="F">Femenino</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nacimiento</label>
                    <input type="date" th:field="*{birthDate}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contratación</label>
                    <input type="date" th:field="*{hireDate}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Departamento</label>
                    <input type="text" th:field="*{deptNo}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Desde</label>
                    <input type="date" th:field="*{fromDate}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Hasta</label>
                    <input type="date" th:field="*{toDate}" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                <a th:href="@{/employee/editar}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
