<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buscar empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow-sm border-0">
        <div class="card-body">

            <h2 class="mb-4">Buscar empleado por número</h2>
            <form th:action="@{/employee/buscar}" method="get" class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Ingrese número de empleado</label>
                    <input type="number" name="empNo" class="form-control" placeholder="Ej. 10001" required>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Buscar</button>
                </div>
            </form>

            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
            <div class="alert alert-warning" th:if="${mensaje}" th:text="${mensaje}"></div>
            <div class="alert alert-success" th:if="${param.editado}">Empleado editado correctamente.</div>
            <div class="alert alert-warning" th:if="${param.eliminado}">Empleado eliminado correctamente.</div>

            <div th:if="${employeeBuscado != null}">
                <table class="table table-bordered table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>Emp No</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Género</th>
                        <th>Nacimiento</th>
                        <th>Contratación</th>
                        <th>Departamento</th>
                        <th>Desde</th>
                        <th>Hasta</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${employeeBuscado.empNo}"></td>
                        <td th:text="${employeeBuscado.firstName}"></td>
                        <td th:text="${employeeBuscado.lastName}"></td>
                        <td th:text="${employeeBuscado.gender}"></td>
                        <td th:text="${employeeBuscado.birthDate}"></td>
                        <td th:text="${employeeBuscado.hireDate}"></td>
                        <td th:text="${employeeBuscado.deptNo}"></td>
                        <td th:text="${employeeBuscado.fromDate}"></td>
                        <td th:text="${employeeBuscado.toDate}"></td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/employee/editar/{empNo}(empNo=${employeeBuscado.empNo})}"
                                   class="btn btn-warning btn-sm">
                                    Editar
                                </a>

                                <form th:action="@{/employee/eliminar/{empNo}(empNo=${employeeBuscado.empNo})}"
                                      method="post"
                                      class="m-0"
                                      onsubmit="return confirm('¿Seguro que deseas eliminar este empleado?');">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        Eliminar
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

</body>
</html>
